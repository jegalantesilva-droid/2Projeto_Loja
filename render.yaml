# render.yaml — Render Web Service configuration
# Commit this to your Git repo, Render auto-deploys when you push
# Docs: https://docs.render.com/deploy-node

services:
  - type: web
    name: zephyr-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        scope: build,runtime
        # Leave empty, set in Render dashboard
      - key: SUPABASE_KEY
        scope: build,runtime
        # Leave empty, set in Render dashboard (KEEP SECRET!)
      - key: NODE_ENV
        value: production
    autoDeploy: true
